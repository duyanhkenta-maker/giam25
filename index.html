<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tạo Link Shopee</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#ffd9cf;
    font-family:Arial;
}

.wrap{
    max-width:500px;
    margin:auto;
}

.logo{
    text-align:center;
    font-size:38px;
    font-weight:bold;
    color:#ff5b2e;
    margin-bottom:10px;
}

.domain{
    text-align:center;
    background:#ffe9e3;
    padding:10px;
    border-radius:30px;
    margin-bottom:20px;
    color:#cc5a3d;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:20px;
}

.title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.input{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border-radius:15px;
    border:2px solid #eee;
    font-size:16px;
}

.main-btn{
    width:100%;
    margin-top:15px;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#ff5b2e;
    color:#fff;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.box{
    border:3px solid #ff6d4a;
    border-radius:20px;
    padding:15px;
    margin-top:20px;
}

.box-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.link{
    word-break:break-all;
    color:#444;
    margin-bottom:15px;
}

.copy{
    background:#ff5b2e;
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

.buy{
    display:block;
    text-align:center;
    background:#27c866;
    color:#fff;
    text-decoration:none;
    padding:18px;
    border-radius:15px;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.share{
    display:block;
    text-align:center;
    background:#3b5998;
    color:#fff;
    text-decoration:none;
    padding:18px;
    border-radius:15px;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="wrap">

    <div class="logo">🔗 Tạo Link Shopee</div>

    <div class="domain">
        tqsansale.shopee.cc
    </div>

    <div class="card">

        <div class="title">👜 Link sản phẩm Shopee</div>

        <div class="input">
            <input id="link" placeholder="Dán link Shopee vào đây..." />
        </div>

        <button class="main-btn" onclick="taoLink()">
            ✏️ Tạo Link Ngay
        </button>

        <div id="result"></div>

    </div>

</div>

<script>

const AFFILIATE_ID = "17362260173";

function taoLink(){

    let input = document.getElementById("link").value.trim();

    if(input === ""){
        alert("Nhập link Shopee");
        return;
    }

    let finalLink =
`https://s.shopee.vn/an_redir?affiliate_id=${AFFILIATE_ID}&sub_id=facebook&origin_link=${encodeURIComponent(input)}`;

    document.getElementById("result").innerHTML = `

    <div class="box">

        <div class="box-title">
            ✅ Link Affiliate Shopee
        </div>

        <div class="link" id="textLink">
            ${finalLink}
        </div>

        <button class="copy" onclick="copyLink()">
            📋 Copy
        </button>

    </div>

    <a class="buy" href="${finalLink}" target="_blank">
        🛒 Mua Ngay
    </a>

    <a class="share"
       href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(finalLink)}"
       target="_blank">
       📘 Chia sẻ Facebook
    </a>

    `;
}

function copyLink(){

    let text =
    document.getElementById("textLink").innerText;

    navigator.clipboard.writeText(text);

    alert("Đã copy link!");
}

</script>

</body>
</html>
